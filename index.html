<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ONYX</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --green: #00e87a; --amber: #ffbb00; --red: #ff3366; --blue: #55aaff; --golf: #a8e063; --nfl: #d4a017; }
html, html { height: 100%; }
body { background: #0a0a0a; color: #fff; font-family: 'Nunito', sans-serif; height: 100%; overflow: hidden; }

/* SPORT SELECTOR */
#sport-selector { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center;  overflow-y: auto; padding: 40px 20px; }
#sport-selector.hidden { display: none; }
.selector-logo { font-family: 'Bebas Neue', sans-serif; font-size: 72px; letter-spacing: 10px; color: #fff; line-height: 1; }
.selector-tag { font-size: 14px; font-weight: 700; color: #444; letter-spacing: 3px; text-transform: uppercase; margin-top: 6px; margin-bottom: 48px; }
.sport-cards { display: flex; gap: 20px; }

/* PROP TRACKER */
#prop-tracker { width: 700px; max-width: 95vw; margin-top: 48px; }
.sport-card { width: 220px; padding: 36px 28px; border: 2px solid #1e1e1e; background: #0d0d0d; cursor: pointer; transition: all 0.18s; text-align: center; border-radius: 6px; position: relative; overflow: hidden; }
.sport-card::before { content: ''; position: absolute; inset: 0; opacity: 0; transition: opacity 0.18s; }
.sport-card:hover { border-color: #444; transform: translateY(-4px); }
.sport-card:hover::before { opacity: 1; }
.sc-nba::before { background: linear-gradient(135deg, rgba(0,232,122,0.08) 0%, transparent 70%); }
.sc-nba:hover { border-color: var(--green); }
.sc-mlb::before { background: linear-gradient(135deg, rgba(85,170,255,0.08) 0%, transparent 70%); }
.sc-mlb:hover { border-color: var(--blue); }
.sc-val::before { background: linear-gradient(135deg, rgba(255,70,85,0.08) 0%, transparent 70%); }
.sc-val:hover { border-color: var(--val); }
.sc-golf::before { background: linear-gradient(135deg, rgba(168,224,99,0.08) 0%, transparent 70%); }
.sc-golf:hover { border-color: var(--golf); }
.dot-golf { background: var(--golf); }
.sc-icon { font-size: 48px; margin-bottom: 16px; height: 64px; display: flex; align-items: center; justify-content: center; }
.sc-sport { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 4px; margin-bottom: 6px; }
.sc-nba .sc-sport { color: var(--green); }
.sc-mlb .sc-sport { color: var(--blue); }
.sc-val .sc-sport { color: var(--val); }
.sc-golf .sc-sport { color: var(--golf); }
.sc-nfl .sc-sport { color: var(--nfl); }
.sc-desc { font-size: 12px; font-weight: 700; color: #555; letter-spacing: 1px; margin-bottom: 16px; height: 32px; display: flex; align-items: center; justify-content: center; }
.sc-status { font-size: 11px; font-weight: 800; padding: 4px 10px; border-radius: 3px; text-transform: uppercase; letter-spacing: 1px; display: inline-block; }
.status-live { background: #001800; color: var(--green); border: 1px solid var(--green); }
.status-today { background: #001333; color: var(--blue); border: 1px solid var(--blue); }
.status-next { background: #1a0000; color: #ff6666; border: 1px solid #661111; }
/* parlay top nav */
      .top-bar { position:fixed; top:0; left:0; right:0; height:48px; background:#080808; border-bottom:1px solid #1a1a1a; display:flex; align-items:center; padding:0 14px; z-index:10; gap:12px; }
      .top-bar-title { font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:4px; color:#fff; flex:1; text-align:center; }
      .top-bar-right { font-size:10px; font-weight:800; color:#444; letter-spacing:2px; text-transform:uppercase; white-space:nowrap; }
      /* parlay page */
      .prl-card { background:#0c0c0c; border:1px solid #1e1e1e; border-radius:10px; padding:20px; margin-bottom:22px; }
      .prl-card-gold { border-color:#332800; background:#0a0900; }
      .prl-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
      .prl-title { font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:4px; color:var(--green); }
      .prl-odds { font-family:'Bebas Neue',sans-serif; font-size:30px; letter-spacing:2px; color:var(--green); }
      .prl-sub { font-size:11px; color:#555; letter-spacing:0.5px; margin-bottom:18px; line-height:1.5; }
      .prl-legs { display:flex; flex-direction:column; gap:14px; }
      .prl-leg { display:flex; gap:14px; background:#111; border-radius:8px; padding:14px; border:1px solid #1a1a1a; }
      .prl-leg-num { font-family:'Bebas Neue',sans-serif; font-size:22px; color:#333; min-width:32px; height:32px; background:#0d0d0d; border:1px solid #222; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0; margin-top:2px; }
      .prl-leg-body { flex:1; }
      .prl-leg-sport { font-size:10px; color:#444; letter-spacing:2px; text-transform:uppercase; margin-bottom:4px; }
      .prl-leg-player { font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:2px; color:#fff; line-height:1; margin-bottom:4px; }
      .prl-leg-prop { font-size:14px; color:var(--green); font-weight:700; margin-bottom:4px; letter-spacing:0.5px; }
      .prl-leg-conf { font-size:11px; font-weight:800; letter-spacing:1px; margin-bottom:6px; }
      .prl-leg-why { font-size:11px; color:#555; line-height:1.6; border-top:1px solid #1a1a1a; padding-top:6px; margin-top:4px; }
      /* legacy parlay classes (unused) */
      .parlay-card { display:none; }
      .record-btn { font-family: 'Bebas Neue', sans-serif; font-size: 15px; letter-spacing: 4px; padding: 10px 28px; border: 1px solid #2a2a2a; background: #111; color: #555; border-radius: 4px; cursor: pointer; text-transform: uppercase; transition: all 0.15s; display: inline-block; }
.record-btn:hover { border-color: #555; color: #ccc; background: #1a1a1a; }

/* FRAMES */
.sport-frame { position: fixed; inset: 0; display: none; flex-direction: column; z-index: 100; overflow: hidden; }
.sport-frame.active { display: flex; height: 100%; }
.back-nav { position: fixed; top: 0; left: 0; right: 0; z-index: 200; background: #000; border-bottom: 2px solid #1a1a1a; display: flex; align-items: center; height: 48px; }
.back-btn { height: 48px; padding: 0 20px; display: flex; align-items: center; gap: 10px; font-size: 13px; font-weight: 800; color: #555; cursor: pointer; border-right: 1px solid #1a1a1a; letter-spacing: 1px; text-transform: uppercase; transition: all 0.12s; }
.back-btn:hover { color: #fff; background: #111; }
.back-logo { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 4px; color: #fff; padding: 0 20px; border-right: 1px solid #1a1a1a; height: 48px; display: flex; align-items: center; }
.back-sport-label { padding: 0 20px; font-size: 12px; font-weight: 800; color: #444; letter-spacing: 2px; text-transform: uppercase; display: flex; align-items: center; }
.bsd { width: 8px; height: 8px; border-radius: 50%; margin-right: 8px; }
.dot-nba { background: var(--green); } .dot-mlb { background: var(--blue); } .dot-val { background: var(--val); }

.frame-top-spacer { height: 48px; flex-shrink: 0; }
.frame-content { margin-top: 0; padding-top: 0; overflow-y: auto; flex: 1; min-height: 0; box-sizing: border-box; }

/* SHARED */
.sport-topbar { position: sticky; top: 48px; z-index: 90; background: #000; border-bottom: 3px solid #fff; display: flex; align-items: center; }
.sport-logo-wrap { padding: 12px 24px; border-right: 1px solid #2a2a2a; }
.sport-logo { font-family: 'Bebas Neue', sans-serif; font-size: 36px; letter-spacing: 5px; color: #fff; line-height: 1; }
.sport-logo-sub { font-size: 10px; color: #555; font-weight: 700; margin-top: 1px; letter-spacing: 2px; text-transform: uppercase; }
.sport-nav-tabs { display: flex; flex: 1; }
.sport-nav-tab { padding: 0 24px; height: 64px; display: flex; align-items: center; font-size: 14px; font-weight: 800; text-transform: uppercase; cursor: pointer; border-right: 1px solid #1a1a1a; color: #555; transition: all 0.15s; white-space: nowrap; gap: 8px; letter-spacing: 1px; }
.sport-nav-tab:hover { color: #fff; background: #111; }
.sport-nav-tab.active { color: #fff; background: #1a1a1a; border-bottom: 3px solid #fff; }
.live-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); flex-shrink: 0; animation: blink 1.4s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
.sport-topbar-right { margin-left: auto; padding: 0 24px; font-size: 12px; font-weight: 700; color: #555; border-left: 1px solid #1a1a1a; height: 64px; display: flex; align-items: center; }
.sport-page { display: none; } .sport-page.active { display: block; }

/* HERO */
.hero { background: #000; border-bottom: 1px solid #222; padding: 32px 36px 24px; }
.hero-title { font-family: 'Bebas Neue', sans-serif; font-size: 52px; letter-spacing: 6px; line-height: 1; }
.hero-sub { font-size: 14px; color: #ddd; font-weight: 700; margin-top: 8px; }
.hero-stats { display: flex; gap: 2px; margin-top: 18px; }
.hero-stat { flex: 1; padding: 16px 20px; background: #1a1a1a; border-radius: 4px; }
.hero-stat-num { font-family: 'Bebas Neue', sans-serif; font-size: 40px; letter-spacing: 2px; line-height: 1; }
.hero-stat-label { font-size: 12px; color: #ddd; font-weight: 700; margin-top: 4px; }
.num-green { color: var(--green); } .num-amber { color: var(--amber); } .num-red { color: var(--red); } .num-blue { color: var(--blue); } .num-val { color: var(--val); }
.section-hdr { padding: 14px 36px 10px; font-size: 12px; font-weight: 800; color: #ddd; text-transform: uppercase; letter-spacing: 2px; border-bottom: 1px solid #1e1e1e; display: flex; align-items: center; justify-content: space-between; }
.section-hdr span { color: #555; }

/* PICK CARDS (home/top picks pages) */
.picks-col { display: flex; flex-direction: column; gap: 2px; background: #1e1e1e; padding-bottom: 2px; }
.pick-card { background: #161616; padding: 24px 36px 20px; cursor: pointer; transition: background 0.12s, border-left-color 0.12s; position: relative; border-left: 4px solid #252525; border-bottom: 1px solid #111; }
.pick-card:hover { background: #1e1e1e; border-left-color: #444; }
.pc-rank { font-size: 12px; font-weight: 800; color: #555; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 4px; }
.pc-player { font-family: 'Bebas Neue', sans-serif; font-size: 36px; letter-spacing: 2px; line-height: 1; margin-bottom: 2px; }
.pc-prop { font-size: 13px; font-weight: 700; color: #ddd; margin-bottom: 16px; }
.pc-line-row { display: flex; align-items: center; gap: 14px; margin-bottom: 10px; }
.pc-line { font-family: 'Bebas Neue', sans-serif; font-size: 54px; letter-spacing: 2px; line-height: 1; color: #fff; }
.pc-dir { font-size: 13px; font-weight: 900; letter-spacing: 2px; padding: 6px 14px; text-transform: uppercase; border-radius: 4px; }
.dir-over { color: #000; background: var(--green); } .dir-under { color: #000; background: var(--red); }
.pc-proj { font-size: 13px; font-weight: 700; color: #ddd; margin-bottom: 16px; }
.pc-proj strong { color: #fff; font-size: 16px; font-weight: 900; }
.pc-conf-row { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
.conf-label { font-size: 12px; font-weight: 800; color: #fff; text-transform: uppercase; letter-spacing: 1px; white-space: nowrap; }
.conf-track { flex: 1; height: 6px; background: #2a2a2a; border-radius: 4px; }
.conf-fill { height: 100%; border-radius: 4px; }
.cf-hi { background: var(--green); } .cf-md { background: var(--amber); } .cf-lo { background: var(--red); }
.conf-num { font-family: 'Bebas Neue', sans-serif; font-size: 36px; letter-spacing: 1px; line-height: 1; min-width: 68px; text-align: right; }
.conf-num.hi { color: var(--green); } .conf-num.md { color: var(--amber); } .conf-num.lo { color: var(--red); }
.pc-tag { font-size: 12px; font-weight: 700; color: #ddd; line-height: 1.65; padding-top: 12px; border-top: 1px solid #222; }
.pc-badge { position: absolute; top: 20px; right: 28px; font-size: 11px; font-weight: 900; letter-spacing: 1px; padding: 4px 10px; text-transform: uppercase; border-radius: 3px; }
.badge-lock { background: #fff; color: #000; } .badge-hot { background: var(--amber); color: #000; }
.badge-value { background: var(--green); color: #000; } .badge-combo { background: var(--blue); color: #000; }
/* Color-coded left border by pick type */
.pick-card:has(.badge-lock) { border-left-color: #666; }
.pick-card:has(.badge-value) { border-left-color: var(--green); }
.pick-card:has(.badge-hot) { border-left-color: var(--amber); }
.pick-card:has(.badge-combo) { border-left-color: var(--blue); }
/* Prop row borders by confidence */
.prop-row:has(.cf-hi) { border-left-color: #2a2a2a; }
.prop-row:has(.pr-conf-num.hi) { border-left-color: var(--green); }
.prop-row:has(.pr-conf-num.md) { border-left-color: #333; }
.prop-row:has(.pr-conf-num.lo) { border-left-color: var(--red); }

/* GAME TABS */
.game-topbar { background: #0a0a0a; border-bottom: 1px solid #222; display: flex; overflow-x: auto; }
.game-tab { flex: 0 0 auto; padding: 14px 16px; text-align: center; cursor: pointer; border-right: 1px solid #1a1a1a; color: #555; transition: all 0.15s; min-width: 120px; }
.game-tab:last-child { border-right: none; }
.game-tab.active { color: #fff; background: #1a1a1a; border-bottom: 3px solid #fff; }
.game-tab:hover:not(.active) { color: #ccc; background: #141414; }
.gtb-name { font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 2px; }
.gtb-meta { font-size: 10px; font-weight: 700; color: #666; margin-top: 3px; }
.game-tab.active .gtb-meta { color: #999; }
.game-panel { display: none; } .game-panel.active { display: block; }

/* GAME BANNER */
.game-banner { background: #0a0a0a; border-bottom: 1px solid #222; padding: 18px 36px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
.gb-matchup { font-family: 'Bebas Neue', sans-serif; font-size: 30px; letter-spacing: 3px; }
.gb-left .gb-matchup { font-family: 'Bebas Neue', sans-serif; font-size: 30px; letter-spacing: 3px; }
.gb-info, .gb-left .gb-info { font-size: 12px; font-weight: 700; color: #ddd; margin-top: 3px; }
.gb-right { text-align: right; }
.gb-chip { font-size: 11px; font-weight: 800; letter-spacing: 1px; padding: 5px 12px; border: 2px solid; text-transform: uppercase; display: inline-block; border-radius: 3px; }
.gb-context { font-size: 12px; font-weight: 700; color: #ddd; margin-top: 6px; line-height: 1.5; }

/* INJURIES */
.inj-bar { border-bottom: 1px solid #1a1a1a; }
.inj-title { font-size: 11px; font-weight: 800; color: #ddd; text-transform: uppercase; letter-spacing: 2px; padding: 10px 36px; border-bottom: 1px solid #1a1a1a; }
.inj-list { padding: 12px 36px; display: flex; flex-wrap: wrap; gap: 8px; }
.inj-card { border: 2px solid; padding: 10px 14px; min-width: 190px; border-radius: 4px; }
.inj-out { border-color: #882222; background: #1a0000; color: #ff6666; }
.inj-q { border-color: #886600; background: #1a1000; color: #ffcc44; }
.inj-ok { border-color: #226622; background: #001800; color: #55ff99; }
.inj-name { font-size: 13px; font-weight: 900; }
.inj-st { font-size: 11px; font-weight: 700; margin-top: 3px; }
.inj-fx { font-size: 11px; font-weight: 600; color: #ddd; margin-top: 4px; line-height: 1.5; }

/* PROP FILTERS */
.prop-filters { display: flex; border-bottom: 1px solid #1e1e1e; background: #0a0a0a; overflow-x: auto; }
.pf-btn { flex: 0 0 auto; padding: 12px 14px; font-family: 'Nunito', sans-serif; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; border: none; border-right: 1px solid #1a1a1a; background: transparent; color: #555; cursor: pointer; transition: all 0.12s; }
.pf-btn:last-child { border-right: none; }
.pf-btn.active, .pf-btn:hover { background: #1a1a1a; color: #fff; }

/* PROP ROWS */
.prop-row { border-bottom: 1px solid #1a1a1a; border-left: 4px solid #1e1e1e; padding: 20px 36px; transition: background 0.1s, border-left-color 0.1s; }
.prop-row:last-child { border-bottom: none; }
.prop-row:hover { background: #141414; border-left-color: #333; }
.pr-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 12px; }
.pr-player { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 2px; line-height: 1; }
.pr-type { font-size: 12px; font-weight: 700; color: #ddd; margin-top: 4px; }
.pr-badges { display: flex; gap: 6px; flex-shrink: 0; }
.pr-badge { font-size: 11px; font-weight: 900; letter-spacing: 1px; padding: 4px 10px; text-transform: uppercase; border-radius: 3px; }
.pr-main { display: grid; grid-template-columns: 110px 1fr 138px; gap: 14px; align-items: center; margin-bottom: 12px; }
.pr-line-block { text-align: center; }
.pr-line { font-family: 'Bebas Neue', sans-serif; font-size: 44px; letter-spacing: 3px; line-height: 1; }
.pr-dir { font-size: 12px; font-weight: 900; letter-spacing: 2px; padding: 5px 12px; display: inline-block; margin-top: 5px; border-radius: 3px; }
.pr-proj-block { background: #1a1a1a; border: 1px solid #2a2a2a; padding: 12px 16px; border-radius: 4px; }
.pr-proj-label { font-size: 10px; font-weight: 800; color: #ddd; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
.pr-proj-num { font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: 2px; line-height: 1; }
.pr-proj-sub { font-size: 11px; font-weight: 700; color: #ddd; margin-top: 4px; line-height: 1.4; }
.pr-conf-block { text-align: center; }
.pr-conf-num { font-family: 'Bebas Neue', sans-serif; font-size: 44px; letter-spacing: 2px; line-height: 1; }
.pr-conf-num.hi { color: var(--green); } .pr-conf-num.md { color: var(--amber); } .pr-conf-num.lo { color: var(--red); }
.pr-conf-label { font-size: 10px; font-weight: 800; color: #ddd; text-transform: uppercase; letter-spacing: 1px; margin-top: 3px; }
.pr-conf-bar { height: 5px; background: #2a2a2a; margin-top: 6px; border-radius: 3px; }
.pr-conf-fill { height: 100%; border-radius: 3px; }
.pr-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; background: #1e1e1e; margin-bottom: 12px; border-radius: 4px; overflow: hidden; }
.pr-stat { padding: 10px 12px; background: #161616; }
.pr-stat-l { font-size: 10px; font-weight: 800; color: #ddd; text-transform: uppercase; letter-spacing: 0.5px; }
.pr-stat-v { font-size: 15px; font-weight: 900; margin-top: 3px; }
.pr-reason { font-size: 13px; font-weight: 600; color: #ddd; line-height: 1.75; border-left: 4px solid #2a2a2a; padding-left: 14px; margin-top: 10px; }
.pr-note { font-size: 12px; font-weight: 700; color: #cc9900; background: #181200; border: 2px solid #443300; padding: 8px 12px; margin-top: 10px; line-height: 1.6; border-radius: 4px; }
.pr-note.positive { color: #44cc77; background: #001a00; border-color: #224422; }
.pr-avoid { font-size: 12px; font-weight: 700; color: #ff5555; background: #1a0000; border: 2px solid #661111; padding: 8px 12px; margin-top: 10px; border-radius: 4px; }

       /* skip / avoid */
/* compact confidence row for vmp match cards */
  /* smaller than pick-card 36px */
/* Day divider headers for kill props */

/* STANDINGS GRID */
.standings-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 2px; background: #1e1e1e; margin: 2px; }
.standings-col { background: #111; padding: 18px; }
.standings-col-header { font-size: 11px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 14px; border-bottom: 2px solid; padding-bottom: 8px; }
.standing-row { display: flex; align-items: center; justify-content: space-between; padding: 9px 11px; background: #1a1a1a; border-radius: 4px; margin-bottom: 8px; border-left: 3px solid #333; }
.sr-team { font-family: 'Bebas Neue', sans-serif; font-size: 17px; letter-spacing: 1px; }
.sr-sub { font-size: 10px; color: #555; font-weight: 700; margin-top: 2px; }
.sr-rec { font-family: 'Bebas Neue', sans-serif; font-size: 19px; }
.sr-right { text-align: right; }
.srow-map { font-size: 10px; font-weight: 700; color: #555; margin-top: 2px; }

::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: #111; }
::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

/* ═══════════════════════════════════════
   MOBILE — max-width 640px
   Desktop layout untouched above this
═══════════════════════════════════════ */
@media (max-width: 640px) {

  /* Landing page */
  #sport-selector { justify-content: flex-start; padding: 48px 20px 32px; }
  .selector-logo { font-size: 48px; letter-spacing: 6px; }
  .selector-tag { font-size: 11px; margin-bottom: 32px; }
  .sport-cards { flex-direction: column; gap: 12px; width: 100%; }
  .sport-card { width: 100%; padding: 20px 20px; display: flex; align-items: center; gap: 16px; text-align: left; border-radius: 8px; }

  .hero-sub { font-size: 11px; }

  .sport-cards { width: 100%; }
